dataset: dataset1
title: "2008 Explanation for Election Outcomes Master Codes"
questions:
  - "WHY do you think Barack Obama won the Presidential election?"
  - "WHY do you think John McCain lost the Presidential election?"
notes:
  - "Reasons why McCain lost the general election (MCGEN_Code1 to MCGEN_Code13)."
  - "Reasons why Obama won the general election (OBGEN_Code1 to OBGEN_Code13)."
codes:
  "1": "General: Good person, bad person, better person, worse person, better candidate, worse candidate, likeable, not likeable, I like him/her, I do not like him/her."
  "2": "Party: Good Democrat, bad Democrat, better Democrat, worse Democrat, too much like a Republican."
  "5": "Ideology/Philosophy: Conservative, liberal, socialist, Marxist, communist, fascist, libertarian."
  "7": "Political experience: Political experience, work the candidate has done as a politician or elected official, experienced or inexperienced in general."
  "8": "Military experience: Military experience, work the candidate has done as a member of the Army, Navy, Air Force, Marines, or National Guard."
  "9": "Non-political/Non-military experience: Business experience, work the candidate has done in business, industry, or education."
  "10": "Scandal/Cover-up: The candidate was involved in a scandal or cover-up."
  "12": "Other past activity: Any mention of something the candidate did in the past that does not match another code."
  "13": "Personality - Ability: The candidate's ability or inability to accomplish a task or get the job done."
  "14": "Personality - Honesty: The candidate's honesty, integrity, consistency, predictability, sincerity, truthfulness."
  "15": "Personality - Intelligence: The candidate's intelligence."
  "16": "Personality - Leadership: The candidate's ability to lead, get people to work together, make people want to follow, inspire people, inspire the respondent, motivate people, motivate the respondent."
  "17": "Personality - Other: Anything about the candidate's personality that does not match a description in codes 13-16."
  "19": "Health: The candidate's health."
  "20": "Religion: The candidate does, or does not, belong to a specific religious group. The candidate is religious or not religious."
  "21": "Education: The candidate's education, where the candidate went to school or college, the candidate's type of diploma or college degree."
  "22": "Physical Appearance: The candidate's physical appearance, attractiveness, how good the candidate looks."
  "23": "Demographics: The candidate's age, sex, sexual orientation, race, ethnicity, height, weight, marital status, or where the candidate is from."
  "24": "Policy-Economic: What the candidate will do about the economy, taxes, government spending, the budget, the deficit, the national debt. The candidate's policy, stand, views, position, or emphasis on the economy, taxes, government spending, the budget, the deficit, the national debt."
  "25": "Policy-Poor people: What the candidate will do about government programs to help poor people. The candidate's policy, stand, views, position, or emphasis on government programs to help poor people. Only assign to ideas that mention helping poor people or government programs to help poor people, such as welfare, food stamps, Medicaid, AFDC, or public housing. Ideas about how much the candidate cares about poor people are assigned code 31 Groups."
  "26": "Policy-Liberty: What the candidate will allow people to do, prevent people from doing, or make legal or illegal. The candidate's policy, stand, views, position, or emphasis on what people should be allowed or prevented from doing, or what activities should be legal or illegal."
  "27": "Policy-Enemy countries: How the candidate will deal with enemies of the U.S., war, sanctions. The candidate's policy, stand, views, position, or emphasis on enemies of the U.S., war, sanctions."
  "28": "Policy-Friendly countries: How the candidate will deal with friends of the U.S., allies, cooperation with other countries. The candidate's policy, stand, views, position, or emphasis on friends of the U.S., allies, cooperation with other countries."
  "29": "Policy - General foreign policy: How the candidate will deal with other countries in general, foreign policy in general, the reputation of the United States. The candidate's policy, stand, views, position, or emphasis on other countries in general, foreign policy in general, the reputation of the United States."
  "30": "Policy-Other: What the candidate will do about something that does not match a description in codes 20-25. The candidate's policy, stand, views, position, or emphasis on something that does not match a description in codes 20-25."
  "31": "Groups: The candidate's support for, or feelings about, a specific group of people. A specific group of people supported, or did not support, the candidate."
  "32": "Emotions/Feelings: The candidate makes the respondent feel happy, sad, angry, proud, afraid, or scared. The candidate makes people feel happy, sad, angry, proud, afraid, or scared."
  "33": "Candidate-Other: Any mention of something about the candidate that does not match another code."
  "34": "Campaign-General: Better campaign, worse campaign."
  "35": "Campaign-Debates: Won the debates, lost the debates, did better in the debates, did worse in the debates."
  "36": "Campaign-Advertising: Had better advertising, had worse advertising."
  "37": "Campaign-Speeches: Gave better speeches, gave worse speeches."
  "38": "Campaign-Money: Spent a lot of money, did not spend a lot of money, spent too much money, spent too little money, spent more money than the opponents, spent less money than the opponents."
  "39": "Campaign-Other: Any mention of something about the campaign that does not match a description in codes 34-38."
  "40": "Running mate: Any mention of the candidate's running mate or Vice President selection (Biden, Palin)."
  "41": "Opponent: Any mention of the candidate's opponent or the opponent's running mate."
  "42": "Votes: The candidate received more votes than the opponent, the candidate received less votes than the opponent."
